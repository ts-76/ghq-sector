name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger release PR checks
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=$(gh pr list \
            --state open \
            --json headRefName \
            --jq '.[] | select(.headRefName | startswith("release-please--branches--"))[0]' || true)

          if [ -z "$branch" ] || [ "$branch" = "null" ]; then
            echo "No open release-please branch found; skipping workflow dispatch."
            exit 0
          fi

          gh workflow run CI --ref "$branch"
          gh workflow run Security --ref "$branch"
